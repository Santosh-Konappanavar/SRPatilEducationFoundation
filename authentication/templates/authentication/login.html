{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center mt-5">

    <div class="col-md-5">

        <div class="card shadow-lg">

            <div class="card-header bg-primary text-white text-center">

                <h3>S.R. Patil Education Foundation</h3>

                <h5>SRPEG ERP Login</h5>

            </div>

            <div class="card-body">

                <form method="post">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">Username</label>

                        <input
                            type="text"
                            class="form-control"
                            name="username"
                            placeholder="Enter Username">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Password</label>

                        <input
                            type="password"
                            class="form-control"
                            name="password"
                            placeholder="Enter Password">

                    </div>

                    <button class="btn btn-primary w-100">

                        Login

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
