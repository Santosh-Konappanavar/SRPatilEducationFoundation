{% extends "base.html" %}

{% block content %}

<h2>New Department</h2>

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-success">
        Save Department
    </button>

    <a href="{% url 'department_list' %}" class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
